name: Daily News Update

on:
  schedule:
    # 每天 PDT 8:00 AM = UTC 15:00
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'manual'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate news page
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate.mjs

      - name: Commit and push
        run: |
          git config user.name "小虾米 🦐"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "📰 Daily news update $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
